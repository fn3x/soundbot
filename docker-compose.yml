services:
  soundbot:
    image: ${SOUNDBOT_IMAGE}
    container_name: soundbot
    restart: unless-stopped
    depends_on:
      - teamspeak
    shm_size: "1gb" # Chromium/CEF (the TS6 client's UI engine) is prone to crashing on the 64MB default
    environment:
      - TS_SSH_HOST=teamspeak
      - TS_SSH_PORT=10022
      - TS_SSH_USER=soundbot
      - TS_SSH_PASS=${TS_SSH_PASS}
      - TS_VSERVER_ID=1
      - TS_CHANNEL_ID=${TS_CHANNEL_ID:-2}
      - TS_SOUNDS_DIR=/opt/soundbot/sounds
      - TS_SINK=ts_bot_sink
      - TS_PTT_KEY=F12
      - TS_VOICE_NICKNAME=${TS_VOICE_NICKNAME:-SoundBot}
      - DISPLAY=:99
      # For tts (Amazon Polly via the AWS CLI)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-eu-central-1}
      # For bypassing youtube restrictions
      - TS_YT_COOKIES_PATH=${TS_YT_COOKIES_PATH:-/run/secrets/yt_cookies}
      # Telegram environment variables
      - TG_BOT_TOKEN=
      - TG_CHAT_IDS= # comma-separated, one or more
      - TG_FAVORITES_FOLDER=/opt/sounds/favorites
    secrets:
      - yt_cookies
    volumes:
      - ./teamspeak-client:/opt/soundbot/teamspeak-client:ro
      - ./sounds:/opt/soundbot/sounds
      - ./favorites:/opt/soundbot/favorites
      - soundbot-ts-profile:/home/appuser
    ports:
      # VNC - only needed for the initial manual setup (and occasional debugging).
      # Consider removing this once everything's confirmed working, or at least
      # firewalling it off rather than leaving it open indefinitely.
      - "5900:5900"

secrets:
  yt_cookies:
    file: ./yt_cookies.txt

volumes:
  soundbot-ts-profile:
    external: true
    name: soundbot-ts-profile
