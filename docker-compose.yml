services:
  soundbot:
    image: ${SOUNDBOT_IMAGE}
    container_name: soundbot
    restart: unless-stopped
    depends_on:
      - teamspeak
    shm_size: "1gb" # Chromium/CEF (the TS6 client's UI engine) is prone to crashing on the 64MB default
    environment:
      - TS_SSH_HOST=teamspeak
      - TS_SSH_PORT=10022
      - TS_SSH_USER=soundbot
      - TS_SSH_PASS=${TS_SSH_PASS}
      - TS_VSERVER_ID=1
      - TS_CHANNEL_ID=${TS_CHANNEL_ID:-2}
      - TS_SOUNDS_DIR=/opt/soundbot/sounds
      - TS_SINK=ts_bot_sink
      - TS_PTT_KEY=F12
      - TS_VOICE_NICKNAME=${TS_VOICE_NICKNAME:-SoundBot}
      - DISPLAY=:99
    volumes:
      # The two things that can't live in the public repo/image: provide these
      # yourself on the host, next to this compose file.
      - ./teamspeak-client:/opt/soundbot/teamspeak-client:ro
      - ./sounds:/opt/soundbot/sounds
      # Persists the TS6 client's profile (server bookmark, identity, selected
      # audio device) across container restarts - without this you'd have to
      # redo the one-time manual VNC setup every single time the container restarts.
      - soundbot-ts-profile:/root/.cache/TeamSpeak
    ports:
      # VNC - only needed for the initial manual setup (and occasional debugging).
      # Consider removing this once everything's confirmed working, or at least
      # firewalling it off rather than leaving it open indefinitely.
      - "5900:5900"

volumes:
  soundbot-ts-profile:
